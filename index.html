<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<style>
/* PAGE-SPECIFIC: Home */
body {
  overflow: hidden;
}

.container {
  width: min(100%, var(--content-max-width));
  height: calc(100vh - var(--body-padding-top) - 1rem);
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: clamp(0.5rem, 1vw, 1rem);
  padding: clamp(1.5rem, 2vw, 2rem) var(--page-gutter-desktop) clamp(0.5rem, 1vw, 0.8rem);
  margin: 0 auto;
  box-sizing: border-box;
}

.card {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}

.card,
.card:visited,
.card:hover,
.card:active {
  color: black;
  text-decoration: none;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center center;
}

.card-overlay {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.8);
  padding: 12px 22px;
  letter-spacing: 1px;
  white-space: nowrap;
  z-index: 2;
}

.card::before {
  content: "";
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  background: rgba(255,255,255,0.8);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 1;
}

.card:hover::before {
  opacity: 1;
}

@media (max-width: 600px) {
  body {
    overflow: auto;
  }
  
  .card-overlay {
    font-size: clamp(0.7rem, 3vw, 0.9rem);
    padding: clamp(0.4rem, 2vw, 0.6rem) clamp(0.8rem, 3vw, 1rem);
  }

  .container {
    height: auto;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(0.4rem, 1vw, 0.6rem);
    padding: clamp(0.2rem, 0.5vw, 0.4rem) clamp(0.5rem, 1vw, 0.8rem) clamp(0.5rem, 1vw, 0.8rem);
  }
  
  .card {
    aspect-ratio: 3 / 4;
    height: auto;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo"><a href="index.html">SARA HAGLUND</a></div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>
    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="portfolio.html">FASHION DESIGN</a>
      <a href="content.html">CONTENT CREATION</a>
      <a href="about.html">ABOUT</a>
    </div>
  </div>
</div>

<div class="container">
  <a href="portfolio.html" class="card">
    <img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775121250/WGSN_Original_Image_20221020_143243_dpm8dh.jpg" alt="Fashion design cover">
    <div class="card-overlay">FASHION DESIGN</div>
  </a>

  <a href="content.html" class="card">
    <img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775121263/jeslerm_jeslerm5_k8nhox.jpg" alt="Content creation cover">
    <div class="card-overlay">CONTENT CREATION</div>
  </a>
</div>

</body>
</html>
