<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: var(--bg-color);
  color: var(--text-color);
}

/* --- HEADER --- */
.header {
  padding: 20px 40px 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  position: relative;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

/* LINE ALIGNED WITH A CROSSBAR */
.logo::after {
  content: "";
  position: absolute;
  left: 0;
  top: 42%; /* adjusted to match A crossbar visually */
  width: 100vw;
  height: 1px;
  background: var(--text-color);
  transform: translateY(-50%);
  z-index: -1;
}

/* CENTERED SUBTEXT */
.subtext {
  font-size: 14px;
  margin-top: 12px;
  letter-spacing: 1px;
  text-align: center;
  width: 100%;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--text-color);
  font-size: 14px;
}

/* --- CONTAINER --- */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  flex-wrap: wrap;
  padding: 40px 20px;
}

.card-wrapper {
  flex: 1 1 300px;
  max-width: 420px;
}

/* --- TITLE ABOVE IMAGE --- */
.card-title {
  margin-bottom: 20px; /* MORE SPACE */
  font-size: 18px;
  letter-spacing: 1px;
  display: inline-block;
  position: relative;
}

/* LINE ON HOVER */
.card-title::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0;
  height: 1px;
  background: var(--text-color);
  transition: width 0.3s ease;
}

.card-wrapper:hover .card-title::after {
  width: 100%;
}

/* --- CARD --- */
.card {
  width: 100%;
  aspect-ratio: 3 / 5;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: none; /* REMOVE POP EFFECT */
}

/* --- MOBILE --- */
@media (max-width: 600px) {
  .card {
    transform: scale(0.85);
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="logo">SARA HAGLUND</div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>
    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT ME</a>
      <a href="sirihaglund@gmail.com">CONTACT</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="card-wrapper">
    <div class="card-title">FASHION DESIGN</div>
    <a href="portfolio.html" class="card">
      <img src="portfolio.jpg" alt="Fashion">
    </a>
  </div>

  <div class="card-wrapper">
    <div class="card-title">SOCIAL MEDIA</div>
    <a href="content.html" class="card">
      <img src="content.jpg" alt="Content">
    </a>
  </div>

</div>

</body>
</html>
