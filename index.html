<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: var(--bg-color);
  color: var(--text-color);
}

/* HEADER */
.header {
  padding: 20px 40px 10px;
  overflow: visible;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  position: relative;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

/* FULL WIDTH LINE */
.logo::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: var(--text-color);
  opacity: 0.6;
  transform: translate(-50%, -50%);
  z-index: -1;
}

.subtext {
  font-size: 14px;
  margin-top: 12px;
  letter-spacing: 1px;
  text-align: center;
  width: 100%;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--text-color);
  font-size: 14px;
}

/* CONTENT */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  flex-wrap: wrap;
  padding: 40px 20px;
}

.card-wrapper {
  flex: 1 1 300px;
  max-width: 420px;
}

.card-title {
  margin-bottom: 20px;
  font-size: 18px;
  letter-spacing: 1px;
  display: inline-block;
  position: relative;
}

.card-title::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -4px;
  width: 0;
  height: 1px;
  background: var(--text-color);
  transition: width 0.3s ease;
}

.card-wrapper:hover .card-title::after {
  width: 100%;
}

.card {
  width: 100%;
  aspect-ratio: 9 / 16;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MOBILE */
@media (max-width: 600px) {

  .header-top {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .header-left {
    align-items: center;
  }

  .nav {
    margin-top: 12px;
  }

  .nav a {
    margin: 0 10px;
    font-size: 12px;
  }

  .logo {
    font-size: 42px;
  }

  .subtext {
    font-size: 10px;
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-top: 6px;
  }

  .card {
    transform: scale(0.85);
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="header-left">
      <div class="logo">SARA HAGLUND</div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>
    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT ME</a>
      <a href="mailto:your@email.com">CONTACT</a>
    </div>
  </div>
</div>

<div class="container">

  <div class="card-wrapper">
    <div class="card-title">FASHION DESIGN</div>
    <a href="portfolio.html" class="card">
      <img src="portfolio.jpg">
    </a>
  </div>

  <div class="card-wrapper">
    <div class="card-title">SOCIAL MEDIA</div>
    <a href="content.html" class="card">
      <img src="content.jpg">
    </a>
  </div>

</div>

</body>
</html>
