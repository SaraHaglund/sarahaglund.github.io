<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>
<style>
/* --- General Styles --- */
body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: white;
}

h1 {
  margin-top: 80px;
  font-size: 42px;
}

p {
  color: #666;
  margin-bottom: 60px;
}

/* --- Container --- */
.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap; /* allows wrapping on small screens */
  padding: 0 20px; /* padding for mobile */
}

/* --- Card Wrapper --- */
.card-wrapper {
  flex: 1 1 300px; /* grow/shrink, min width 300px */
  max-width: 470px; /* max card width */
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 40px;
}

.card-wrapper h2 {
  margin-bottom: 20px;
  font-size: 28px;
}

/* --- Card --- */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 470 / 760; /* keeps height/width ratio consistent */
  overflow: hidden;
  border-radius: 12px; /* optional rounded corners */
  cursor: pointer;
  transition: transform 0.3s ease;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* --- Title overlay (optional if you want text on images) --- */
.title {
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  color: white;
  font-weight: bold;
  font-size: 20px;
  letter-spacing: 1px;
  text-shadow: 0 0 5px rgba(0,0,0,0.5);
}

/* --- Responsive Text --- */
@media (max-width: 600px) {
  h1 {
    font-size: 32px;
    margin-top: 40px;
  }
  p {
    margin-bottom: 40px;
  }
  .card-wrapper h2 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<h1>Sara Haglund</h1>
<p>Freelance Fashion Designer & Content Creator</p>

<div class="container">

  <div class="card-wrapper">
    <h2>FASHION</h2>
    <a href="portfolio.html" class="card">
      <img src="portfolio.jpg" alt="Fashion Portfolio">
    </a>
  </div>

  <div class="card-wrapper">
    <h2>CONTENT & EDITING</h2>
    <a href="videos.html" class="card">
      <img src="content.jpg" alt="Content Creation">
    </a>
  </div>

</div>

</body>
</html>
