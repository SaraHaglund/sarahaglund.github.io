<!-- ================= LANDING PAGE (index.html) ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: var(--bg-color);
  color: var(--text-color);
}

/* --- Top Bar --- */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 28px;
}

.nav a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--text-color);
}

/* --- Container --- */
.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  padding: 40px 20px;
}

.card-wrapper {
  flex: 1 1 300px;
  max-width: 470px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* --- Hover Title --- */
.hover-title {
  margin-bottom: 15px;
  font-size: 20px;
  letter-spacing: 1px;
  padding: 5px 10px;
  transition: all 0.3s ease;
}

.hover-title:hover {
  border: 1px solid var(--text-color);
  background: var(--bg-color);
}

/* --- Card --- */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 470 / 760;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* --- Mobile --- */
@media (max-width: 600px) {
  .card {
    transform: scale(0.85); /* 15% smaller */
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">SARA HAGLUND</div>
  <div class="nav">
    <a href="index.html">HOME</a>
    <a href="#">ABOUT</a>
    <a href="#">CONTACT</a>
  </div>
</div>

<div class="container">

  <div class="card-wrapper">
    <div class="hover-title">FASHION DESIGN</div>
    <a href="portfolio.html" class="card">
      <img src="portfolio.jpg" alt="Fashion">
    </a>
  </div>

  <div class="card-wrapper">
    <div class="hover-title">SOCIAL MEDIA</div>
    <a href="content.html" class="card">
      <img src="content.jpg" alt="Content">
    </a>
  </div>

</div>

</body>
</html>
