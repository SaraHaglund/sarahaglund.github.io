<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  background: linear-gradient(140deg, #f8f5f1 0%, #eef2f5 100%);
  color: var(--text-color);
  padding-top: 12rem;
  box-sizing: border-box;
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  width: 100%;
  background: white;
  z-index: 1000;
  padding: 2% 3.5% 1%;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 2%;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
  z-index: 2;
}

.logo a,
.logo a:visited,
.logo a:hover,
.logo a:active {
  color: inherit !important;
  text-decoration: none !important;
}

.logo::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: black;
  opacity: 0.5;
  z-index: 1;
}

.subtext {
  font-size: 13px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.nav {
  position: relative;
  z-index: 4;
  background: white;
  padding: 0.2rem 0 0.2rem 0.6rem;
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  align-items: flex-start;
  max-width: 60%;
}

.nav a,
.nav a:visited,
.nav a:hover,
.nav a:active {
  margin-left: 1.8vw;
  text-decoration: none;
  color: black !important;
  font-size: 14px;
  white-space: nowrap;
}

.container {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-auto-rows: 1fr;
  gap: 2%;
  padding: 4% 3% 5%;
  box-sizing: border-box;
}

.card {
  position: relative;
  width: 100%;
  height: min(62vh, 42rem);
  aspect-ratio: auto;
  overflow: hidden;
}

.card,
.card:visited,
.card:hover,
.card:active {
  color: black;
  text-decoration: none;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-overlay {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.8);
  padding: 12px 22px;
  letter-spacing: 1px;
  white-space: nowrap;
  z-index: 2;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.8);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 1;
}

.card:hover::before {
  opacity: 1;
}

img,
video,
iframe {
  max-width: 100%;
  display: block;
}

@media (max-width: 600px) {
  .header {
    padding: 15px;
  }

  .header-top {
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .logo {
    font-size: 34px;
  }

  .subtext {
    font-size: 10px;
  }

  .nav {
    margin-top: 10px;
  }

  .container {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
    padding: 18px 12px 24px;
  }

  .card {
    height: auto;
    aspect-ratio: 9 / 16;
  }
}

@media (max-width: 920px) {
  .header {
    padding: 3% 4% 2%;
  }

  .header-top {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
  }

  .nav {
    max-width: 100%;
    width: 100%;
    justify-content: flex-start;
    gap: 8px 16px;
    padding-left: 0;
  }

  .nav a,
  .nav a:visited,
  .nav a:hover,
  .nav a:active {
    margin-left: 0;
  }
}

@media (max-width: 57.5em) {
  body {
    padding-top: 14rem;
  }
}

@media (max-width: 37.5em) {
  body {
    padding-top: 16rem;
  }
}

/* MOBILE MENU LOCK */
@media (max-width: 37.5em) {
  .header-top {
    flex-direction: column !important;
    align-items: center !important;
    text-align: center !important;
    gap: 1% !important;
  }

  .header {
    padding: 15px !important;
  }

  .logo {
    font-size: 34px !important;
  }

  .subtext {
    font-size: 10px !important;
    margin-top: 10px !important;
  }

  .nav {
    width: 100% !important;
    max-width: 100% !important;
    justify-content: center !important;
    align-items: center !important;
    flex-wrap: nowrap !important;
    margin-top: 2% !important;
    padding: 0 !important;
    gap: 1.8% !important;
    background: white;
    overflow: visible !important;
  }

  .nav a,
  .nav a:visited,
  .nav a:hover,
  .nav a:active {
    margin-left: 0 !important;
    font-size: clamp(0.55rem, 2.1vw, 0.68rem) !important;
    white-space: nowrap !important;
    color: black !important;
    text-decoration: none !important;
  }
}
/* END MOBILE MENU LOCK */

/* DESKTOP MENU LOCK */
@media (min-width: 57.5625em) {
  .header {
    padding: 1.1% 2.2% 0.9% !important;
  }

  .header-top {
    display: flex !important;
    flex-direction: row !important;
    justify-content: space-between !important;
    align-items: flex-start !important;
    gap: 0.8% !important;
  }

  .header-top > div:first-child {
    flex: 0 1 52% !important;
    min-width: 0 !important;
  }

  .logo {
    font-size: clamp(2rem, 2.7vw, 3rem) !important;
  }

  .subtext {
    font-size: clamp(0.54rem, 0.62vw, 0.72rem) !important;
    letter-spacing: 0.035rem !important;
    white-space: nowrap !important;
  }

  .nav {
    flex: 0 1 48% !important;
    width: auto !important;
    max-width: none !important;
    display: flex !important;
    flex-wrap: nowrap !important;
    justify-content: flex-end !important;
    align-items: flex-start !important;
    gap: 0.35vw !important;
    padding: 0.1rem 0 0.1rem 0.15rem !important;
    overflow: visible !important;
    transform: translateX(-2.4vw) !important;
  }

  .nav a,
  .nav a:visited,
  .nav a:hover,
  .nav a:active {
    margin-left: 0 !important;
    font-size: clamp(0.58rem, 0.7vw, 0.8rem) !important;
    white-space: nowrap !important;
    color: black !important;
    text-decoration: none !important;
  }
}
/* END DESKTOP MENU LOCK */
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo"><a href="index.html">SARA HAGLUND</a></div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>

    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="portfolio.html">FASHION DESIGN</a>
      <a href="content.html">CONTENT CREATION</a>
      <a href="about.html">ABOUT</a>
    </div>
  </div>
</div>

<div class="container">
  <a href="portfolio.html" class="card">
    <img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775121250/WGSN_Original_Image_20221020_143243_dpm8dh.jpg" alt="Fashion design cover">
    <div class="card-overlay">FASHION DESIGN</div>
  </a>

  <a href="content.html" class="card">
    <img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775121263/jeslerm_jeslerm5_k8nhox.jpg" alt="Content creation cover">
    <div class="card-overlay">CONTENT CREATION</div>
  </a>
</div>

</body>
</html>
