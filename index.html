<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  background: var(--bg-color);
  color: var(--text-color);
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: white;
  z-index: 1000;
  padding: 20px 40px 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

.logo::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: black;
  opacity: 0.5;
  z-index: -1;
}

.subtext {
  font-size: 13px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: black;
  font-size: 14px;
}

/* CARDS */
.container {
  display: flex;
  justify-content: center;
  gap: 60px;
  padding: 60px 20px;
  flex-wrap: wrap;
}

.card {
  position: relative;
  width: 320px;
  aspect-ratio: 9 / 16;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* TEXT BOX (rectangle) */
.card-overlay {
  position: absolute;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.8);
  padding: 12px 22px;
  letter-spacing: 1px;
  white-space: nowrap;
  z-index: 2;
}

/* FULL IMAGE HOVER EFFECT */
.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.8);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 1;
}

.card:hover::before {
  opacity: 1;
}



/* MOBILE */
@media (max-width: 600px) {

  .header {
    padding: 15px;
  }

  .header-top {
    flex-direction: column;
    align-items: center;
  }

  .logo {
    font-size: 34px;
  }

  .subtext {
    font-size: 10px;
    text-align: center;
  }

  .nav {
    margin-top: 10px;
  }

  .container {
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">SARA HAGLUND</div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>

    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="mailto:sirihaglund@gmail.com">CONTACT</a>
    </div>
  </div>
</div>

<div class="container">

  <a href="portfolio.html" class="card">
    <img src="portfolio.jpg">
    <div class="card-overlay">FASHION DESIGN</div>
  </a>

  <a href="content.html" class="card">
    <img src="content.jpg">
    <div class="card-overlay">CONTENT CREATION</div>
  </a>

</div>

</body>
</html>
