<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sara Haglund</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: var(--bg-color);
  color: var(--text-color);
}

/* --- Header --- */
.header {
  padding: 20px 40px 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 28px;
}

.nav a {
  margin-left: 20px;
  text-decoration: none;
  color: var(--text-color);
}

/* BLACK LINE */
.header-line {
  height: 2px;
  background: var(--text-color);
  margin-top: 15px;
}

/* --- Container --- */
.container {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  padding: 40px 20px;
}

.card-wrapper {
  flex: 1 1 300px;
  max-width: 470px;
}

/* --- Card --- */
.card {
  position: relative;
  width: 100%;
  aspect-ratio: 470 / 760;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover img {
  transform: scale(1.05);
}

/* --- TEXT ON TOP OF IMAGE --- */
.card-title {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: var(--text-color);
  font-size: 18px;
  letter-spacing: 1px;
  padding: 6px 12px;
  transition: all 0.3s ease;
  background: transparent;
}

.card:hover .card-title {
  border: 1px solid var(--text-color);
  background: var(--bg-color);
}

/* --- Mobile --- */
@media (max-width: 600px) {
  .card {
    transform: scale(0.85);
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div class="logo">SARA HAGLUND</div>
    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT ME</a>
      <a href="mailto:your@email.com">CONTACT</a>
    </div>
  </div>
  <div class="header-line"></div>
</div>

<div class="container">

  <div class="card-wrapper">
    <a href="portfolio.html" class="card">
      <img src="portfolio.jpg" alt="Fashion">
      <div class="card-title">FASHION DESIGN</div>
    </a>
  </div>

  <div class="card-wrapper">
    <a href="content.html" class="card">
      <img src="content.jpg" alt="Content">
      <div class="card-title">SOCIAL MEDIA</div>
    </a>
  </div>

</div>

</body>
</html>
