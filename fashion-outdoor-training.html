<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Outdoor Training</title>
<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* PAGE-SPECIFIC */
h1 { text-align: center; margin: 20px 0 24px; font-size: 18px; letter-spacing: 2px; font-weight: 400; }
.page-description { text-align: center; margin: 0 0 24px; font-size: 12px; letter-spacing: 1px; color: #666; }
.back-link {
  display: inline-block;
  margin: 0 0 6px 3.5%;
  position: relative;
  top: -0.4rem;
  font-size: 12px;
  letter-spacing: 1px;
  text-decoration: none;
  color: black;
}
.back-link:visited,
.back-link:hover,
.back-link:active {
  color: black;
}

.grid {
  width: 90vw;
  max-width: 1100px;
  margin: 0 auto 70px;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 20px;
}
.row {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-wrap: wrap;
  flex-wrap: wrap;
  gap: 20px;
  -webkit-box-align: start;
  -webkit-align-items: flex-start;
  align-items: flex-start;
}
.item {
  -webkit-box-flex: 1;
  -webkit-flex: 1 1 240px;
  flex: 1 1 240px;
  min-width: 220px;
  overflow: hidden;
}
.item img {
  width: 100%;
  height: auto;
  display: block;
}
.stacked-column {
  -webkit-box-flex: 1;
  -webkit-flex: 1 1 240px;
  flex: 1 1 240px;
  min-width: 220px;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 20px;
}
.stacked-column .item {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  min-width: 0;
}
.row-span {
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  gap: 20px;
  -webkit-box-align: stretch;
  -webkit-align-items: stretch;
  align-items: stretch;
}
.row-span-left {
  -webkit-box-flex: 3;
  -webkit-flex: 3;
  flex: 3;
  display: -webkit-box;
  display: -webkit-flex;
  display: flex;
  -webkit-flex-direction: column;
  flex-direction: column;
  gap: 20px;
}
.row-span-left .row {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
}
.row-span-right {
  -webkit-box-flex: 1;
  -webkit-flex: 1;
  flex: 1;
  min-width: 220px;
  overflow: hidden;
}
.row-span-right img {
  width: 100%;
  height: 100%;
  -o-object-fit: cover;
  object-fit: cover;
}
@media (max-width: 600px) {
  .grid { width: 100%; max-width: 100%; padding: 0 10px; }
  .row { -webkit-flex-direction: column; flex-direction: column; }
  .stacked-column { -webkit-flex-direction: column; flex-direction: column; }
  .item { -webkit-flex-basis: 100%; flex-basis: 100%; min-width: 0; }
  .row-span { -webkit-flex-direction: column; flex-direction: column; }
  .row-span-left, .row-span-right { -webkit-box-flex: 1; -webkit-flex: 1; flex: 1; }
}

.image-lightbox {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2%;
  background: rgba(0, 0, 0, 0.86);
  z-index: 5000;
}

.image-lightbox.is-open {
  display: flex;
}

.image-lightbox img {
  max-width: 96vw;
  max-height: 92vh;
  object-fit: contain;
  box-shadow: 0 0 24px rgba(0, 0, 0, 0.45);
}

.image-lightbox-close {
  position: absolute;
  top: 1.2rem;
  right: 1.4rem;
  border: 0;
  background: transparent;
  color: #fff;
  font-size: 2rem;
  line-height: 1;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="logo"><a href="index.html">SARA HAGLUND</a></div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>
    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="portfolio.html">FASHION DESIGN</a>
      <a href="content.html">CONTENT CREATION</a>
      <a href="about.html">ABOUT</a>
    </div>
  </div>
</div>
<a class="back-link" href="portfolio.html">← BACK TO FASHION DESIGN</a>
<h1>OUTDOOR TRAINING</h1>
<p class="page-description">Performance-driven training gear for outdoor fitness enthusiasts.</p>
<div class="grid">
  <!-- Row 1 -->
  <div class="row">
    <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775117453/OUTDOORSET2_wdxis7.png" alt="Outdoor training image 1"></div>
    <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775117451/OUTDOORSET_wgpqqz.png" alt="Outdoor training image 2"></div>
    <div class="stacked-column">
      <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775117911/111837_skiss_ydbmp0.png" alt="Outdoor training sketch 1"></div>
      <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775117913/111838_skiss_vlgw4b.png" alt="Outdoor training sketch 2"></div>
    </div>
  </div>
  <!-- Row 2 + 3 with spanning image -->
  <div class="row-span">
    <div class="row-span-left">
      <div class="row">
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775058997/OUTDOORPURPLE_kklgc2.jpg" alt="Outdoor training image 3"></div>
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775059007/Sk%C3%A4rmavbild_2022-10-03_kl._13.27.28_v2ngwp.png" alt="Outdoor training image 4"></div>
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775058992/OUTDOOR23_q0idaf.png" alt="Outdoor training image 5"></div>
      </div>
      <div class="row">
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775059003/OUTDOOR232_djmjpn.jpg" alt="Outdoor training image 6"></div>
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775058987/OUTDOORRAIN2_cdusfh.jpg" alt="Outdoor training image 7"></div>
        <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775059012/OUTDOOR231_xefi5y.jpg" alt="Outdoor training image 8"></div>
      </div>
    </div>
    <div class="row-span-right">
      <img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775058977/OUTDOORRAIN_atlljk.jpg" alt="Outdoor training rain image">
    </div>
  </div>
</div>
<div class="image-lightbox" id="imageLightbox" aria-hidden="true">
  <button class="image-lightbox-close" type="button" aria-label="Close image">&times;</button>
  <img id="imageLightboxImg" src="" alt="">
</div>
<script>
(function () {
  const lightbox = document.getElementById("imageLightbox");
  if (!lightbox) return;

  const lightboxImg = document.getElementById("imageLightboxImg");
  const closeBtn = lightbox.querySelector(".image-lightbox-close");

  const openLightbox = (src, alt) => {
    lightboxImg.src = src;
    lightboxImg.alt = alt || "";
    lightbox.classList.add("is-open");
    lightbox.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  };

  const closeLightbox = () => {
    lightbox.classList.remove("is-open");
    lightbox.setAttribute("aria-hidden", "true");
    lightboxImg.src = "";
    document.body.style.overflow = "";
  };

  document.querySelectorAll(".grid .item img").forEach((img) => {
    img.style.cursor = "zoom-in";
    img.addEventListener("click", () => openLightbox(img.src, img.alt));
  });

  closeBtn.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (event) => {
    if (event.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
      closeLightbox();
    }
  });
})();
</script>
</body>
</html>
