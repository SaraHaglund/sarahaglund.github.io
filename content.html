<style>
:root {
  --bg-color: white;
  --text-color: black;
}

body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  text-align: center;
  background: var(--bg-color);
  color: var(--text-color);
}

/* HEADER */
.header {
  padding: 20px 40px 10px;
  overflow: visible;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.header-left {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  position: relative;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

/* FULL WIDTH LINE */
.logo::after {
  content: "";
  position: absolute;
  left: 0%;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: var(--text-color);
  opacity: 0.6;
  transform: translateY(-50%);
  z-index: -1;
}

.subtext {
  font-size: 14px;
  margin-top: 12px;
  letter-spacing: 1px;
  text-align: center;
  width: 100%;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: var(--text-color);
  font-size: 14px;
}

/* PAGE TITLE */
h1 {
  margin-top: 60px;
  margin-bottom: 50px;
  font-family: Helvetica, sans-serif;
  font-weight: normal;
  font-size: 18px; /* same as card titles on landing */
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* --- Grid --- */
.grid {
  width: 90%;
  max-width: 1400px;
  margin: 0 auto 60px auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 40px;
  justify-items: center;
}

/* --- Video wrapper for hover overlay --- */
.video-wrapper {
  position: relative;
  width: 100%;
  max-width: 320px;
}

/* --- Overlay --- */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255, 255, 255, 0.85);
  padding: 12px 20px;
  border-radius: 8px;
  font-family: Helvetica, sans-serif; /* changed from monospace */
  font-weight: normal;
  font-size: 14px;
  color: #000;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  white-space: pre-line;
  pointer-events: none;
}

.video-wrapper:hover .overlay {
  opacity: 1;
}

/* --- Back button --- */
.back {
  margin: 40px 0 60px 0;
  font-size: 24px;
  text-decoration: none;
  color: black;
  display: inline-block;
}

/* --- Responsive --- */
@media (max-width: 1000px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  h1 {
    font-size: 16px;
  }

  .grid {
    grid-template-columns: 1fr;
    gap: 30px;
  }

  .overlay {
    font-size: 12px;
    padding: 8px 16px;
  }

  .back {
    font-size: 20px;
    margin: 20px 0 40px 0;
  }
}
</style>
</head>
