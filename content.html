<style>
body {
  font-family: Helvetica, sans-serif;
  margin: 0;
}

/* HEADER (your original — untouched) */
.header {
  position: sticky;
  top: 0;
  background: white;
  z-index: 1000;
  padding: 20px 40px 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

.logo::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: black;
  opacity: 0.5;
  z-index: -1;
}

.subtext {
  font-size: 13px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: black;
  font-size: 14px;
}

/* TITLE */
h1 {
  text-align: center;
  margin: 60px 0;
  font-size: 16px;
  letter-spacing: 2px;
}

/* GRID — CENTERED PROPERLY */
.grid {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 280px);
  justify-content: center; /* 🔥 THIS centers the full rows */
  gap: 40px;
  padding-bottom: 60px;
}

/* VIDEO */
.video-wrapper {
  position: relative;
  width: 280px;
}

/* FORCE EMBEDS TO FIT */
.video iframe,
.video blockquote {
  width: 100% !important;
}

/* INSTAGRAM */
.instagram-media {
  width: 100% !important;
  margin: 0 !important;
}

/* TIKTOK FIX (IMPORTANT) */
.tiktok-embed {
  width: 100% !important;
  margin: 0 !important;
}

/* OVERLAY */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  background: rgba(255,255,255,0.8);
  padding: 10px 18px;
  font-size: 13px;
  text-align: center;
  opacity: 0;
  transition: 0.3s;
  z-index: 2;
  white-space: pre-line;
  pointer-events: none;
}

.video-wrapper:hover .overlay {
  opacity: 1;
}

/* MOBILE — ONE PER ROW (clean) */
@media (max-width: 600px) {

  .header {
    padding: 15px;
  }

  .header-top {
    flex-direction: column;
    align-items: center;
  }

  .logo {
    font-size: 34px;
  }

  .subtext {
    font-size: 10px;
    text-align: center;
  }

  .nav {
    margin-top: 10px;
  }

  .grid {
    grid-template-columns: 1fr;
    justify-content: center;
  }

  .video-wrapper {
    width: 90%;
    margin: 0 auto;
  }
}
</style>
</head>
