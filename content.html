<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content</title>

<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">

<style>
body {
  font-family: Helvetica, sans-serif;
  margin: 0;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  background: white;
  z-index: 1000;
  padding: 20px 40px 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.logo {
  font-family: 'Gloock', serif;
  font-size: 64px;
  line-height: 0.9;
  position: relative;
}

.logo::after {
  content: "";
  position: absolute;
  left: 0;
  top: 0.55em;
  width: 100vw;
  height: 1px;
  background: black;
  opacity: 0.5;
  z-index: -1;
}

.subtext {
  font-size: 13px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.nav a {
  margin-left: 25px;
  text-decoration: none;
  color: black;
  font-size: 14px;
}

/* TITLE */
h1 {
  text-align: center;
  margin: 60px 0;
  font-size: 16px;
  letter-spacing: 2px;
  font-weight: 500;
}

/* GRID */
.grid {
  width: 90%;
  margin: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
}

/* WRAPPER (IMPORTANT FIX) */
.video-wrapper {
  position: relative;
}

/* VIDEO RATIO */
.video {
  position: relative;
  width: 100%;
  padding-top: 177.77%;
  overflow: hidden;
}

.video iframe,
.video blockquote {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100% !important;
  height: 100% !important;
}

/* OVERLAY (FIXED) */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.8);
  padding: 10px 18px;
  font-size: 13px;
  letter-spacing: 1px;
  text-align: center;
  opacity: 0;
  transition: 0.3s;
  z-index: 2;
  white-space: pre-line;
}

/* SHOW ON HOVER */
.video-wrapper:hover .overlay {
  opacity: 1;
}

/* MOBILE */
@media (max-width: 600px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .logo {
    font-size: 34px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">
    <div>
      <div class="logo">SARA HAGLUND</div>
      <div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div>
    </div>

    <div class="nav">
      <a href="index.html">HOME</a>
      <a href="about.html">ABOUT</a>
      <a href="mailto:sirihaglund@gmail.com">CONTACT</a>
    </div>
  </div>
</div>

</body>
</html>
