<style>
/* --- General Styles --- */
body {
  font-family: Helvetica, sans-serif;
  margin: 0;
  background: white;
  text-align: center;
}

h1 {
  margin-top: 60px;
  margin-bottom: 50px;
  font-size: 36px;
}

/* --- Grid --- */
.grid {
  width: 90%;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  justify-items: center;
}

/* --- Video wrapper for hover overlay --- */
.video-wrapper {
  position: relative;
  width: 100%;
  max-width: 320px;
}

.video {
  width: 100%;
}

/* --- Overlay --- */
.overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255, 255, 255, 0.85); /* slightly transparent white */
  padding: 12px 20px;
  border-radius: 8px;
  font-family: monospace;
  font-size: 14px;
  color: #000;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s ease;
  white-space: pre-line; /* allows multiple lines */
  pointer-events: none; /* so clicking video works */
}

.video-wrapper:hover .overlay {
  opacity: 1;
}

/* --- Back button --- */
.back {
  margin: 60px;
  font-size: 24px;
  text-decoration: none;
  color: black;
  display: inline-block;
}

/* --- Responsive --- */
@media (max-width: 1000px) {
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 600px) {
  .grid {
    grid-template-columns: 1fr;
  }
  .overlay {
    font-size: 12px;
    padding: 8px 16px;
  }
}
</style>
</head>
