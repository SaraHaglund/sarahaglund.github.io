<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Creation & Editing - Sara Haglund</title>
<style>
    body {
        font-family: Helvetica, sans-serif;
        margin: 0;
        padding: 20px;
        background: white;
        text-align: center;
    }

    h1 {
        font-size: 36px;
        margin-bottom: 30px;
    }

    /* Grid container */
    .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px; /* Space between videos */
        justify-items: center;
    }

    /* Videos / Images */
    .video-grid iframe,
    .video-grid img {
        width: 100%;
        aspect-ratio: 9 / 16;
        border-radius: 10px;
        border: none;
    }

    /* Back arrow */
    .back-arrow {
        margin-top: 30px;
        font-size: 24px;
        text-decoration: none;
        color: #333;
        font-weight: bold;
    }

    /* Mobile responsiveness */
    @media (max-width: 600px) {
        h1 {
            font-size: 28px;
        }
        .video-grid {
            gap: 15px;
        }
    }
</style>
</head>
<body>

<h1>Content Creation & Editing</h1>

<div class="video-grid">
    <!-- Instagram video -->
    <iframe src="https://www.instagram.com/reel/DVVwkT7Amf2/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==/embed" allowfullscreen></iframe>

    <!-- TikTok video -->
    <iframe src="https://www.tiktok.com/embed/XXXXXXXX" allowfullscreen></iframe>

    <!-- Image placeholder -->
    <img src="content1.jpg" alt="Content Preview 1">

    <!-- Another video -->
    <iframe src="https://www.instagram.com/p/YYYYYYYY/embed" allowfullscreen></iframe>

    <!-- Add more videos/images as needed -->
</div>

<a href="index.html" class="back-arrow">&lt;---</a>

</body>
</html>
