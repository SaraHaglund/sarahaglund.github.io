<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tennis</title>
<link href="https://fonts.googleapis.com/css2?family=Gloock&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* PAGE-SPECIFIC */
h1 { text-align: center; margin: 20px 0 24px; font-size: 18px; letter-spacing: 2px; font-weight: 400; }
.page-description { text-align: center; margin: 0 0 24px; font-size: 12px; letter-spacing: 1px; color: #666; }
.back-link {
  display: inline-block;
  margin: 0 0 6px 3.5%;
  position: relative;
  top: -0.4rem;
  font-size: 12px;
  letter-spacing: 1px;
  text-decoration: none;
  color: black;
}
.back-link:visited,
.back-link:hover,
.back-link:active {
  color: black;
}

.grid {
  width: min(1100px, 90vw);
  margin: 0 auto 70px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  align-items: stretch;
}
.item {
  flex: 1 1 240px;
  min-width: 220px;
  aspect-ratio: 9 / 16;
  overflow: hidden;
}
.item img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: left top;
  display: block;
}
@media (max-width: 900px) {
  .item { flex-basis: calc(50% - 10px); }
}
@media (max-width: 600px) {
  .grid { width: 100%; max-width: 100%; }
  .item { flex-basis: 100%; min-width: 0; aspect-ratio: auto; }
  .item img { width: 100%; height: auto; }
}

.image-lightbox {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2%;
  background: rgba(0, 0, 0, 0.86);
  z-index: 5000;
}

.image-lightbox.is-open {
  display: flex;
}

.image-lightbox img {
  max-width: 96vw;
  max-height: 92vh;
  object-fit: contain;
  box-shadow: 0 0 24px rgba(0, 0, 0, 0.45);
}

.image-lightbox-close {
  position: absolute;
  top: 1.2rem;
  right: 1.4rem;
  border: 0;
  background: transparent;
  color: #fff;
  font-size: 2rem;
  line-height: 1;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="header"><div class="header-top"><div><div class="logo"><a href="index.html">SARA HAGLUND</a></div><div class="subtext">FREELANCE FASHION DESIGNER & CONTENT CREATOR</div></div><div class="nav"><a href="index.html">HOME</a>
      <a href="portfolio.html">FASHION DESIGN</a>
      <a href="content.html">CONTENT CREATION</a>
      <a href="about.html">ABOUT</a></div></div></div>
<a class="back-link" href="portfolio.html">← BACK TO FASHION DESIGN</a>
<h1>TENNIS</h1>
<p class="page-description">Specialized tennis apparel for on-court performance.</p>
<div class="grid">
  <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775118104/PAD4_xbzhar.png" alt="Tennis cover image"></div>
  <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775118102/PAD3_ytxkyp.png" alt="Tennis image 1"></div>
  <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775118100/PAD2_n3gi4o.png" alt="Tennis image 2"></div>
  <div class="item"><img src="https://res.cloudinary.com/dbkxtw3hq/image/upload/v1775118098/PAD1_fpu4sl.png" alt="Tennis image 3"></div>
</div>
<div class="image-lightbox" id="imageLightbox" aria-hidden="true">
  <button class="image-lightbox-close" type="button" aria-label="Close image">&times;</button>
  <img id="imageLightboxImg" src="" alt="">
</div>
<script>
(function () {
  const lightbox = document.getElementById("imageLightbox");
  if (!lightbox) return;

  const lightboxImg = document.getElementById("imageLightboxImg");
  const closeBtn = lightbox.querySelector(".image-lightbox-close");

  const openLightbox = (src, alt) => {
    lightboxImg.src = src;
    lightboxImg.alt = alt || "";
    lightbox.classList.add("is-open");
    lightbox.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  };

  const closeLightbox = () => {
    lightbox.classList.remove("is-open");
    lightbox.setAttribute("aria-hidden", "true");
    lightboxImg.src = "";
    document.body.style.overflow = "";
  };

  document.querySelectorAll(".grid .item img").forEach((img) => {
    img.style.cursor = "zoom-in";
    img.addEventListener("click", () => openLightbox(img.src, img.alt));
  });

  closeBtn.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (event) => {
    if (event.target === lightbox) {
      closeLightbox();
    }
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && lightbox.classList.contains("is-open")) {
      closeLightbox();
    }
  });
})();
</script>
</body>
</html>
