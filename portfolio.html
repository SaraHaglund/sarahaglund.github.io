<style>
/* PAGE-SPECIFIC: Portfolio */
.page-title {
  text-align: center;
  margin: clamp(1rem, 3vw, 2rem) 0 clamp(0.5rem, 1vw, 0.75rem);
  letter-spacing: 0.08em;
  font-size: var(--page-title-font-size);
  font-weight: 500;
}

.page-subtitle {
  text-align: center;
  margin: 0 0 clamp(1rem, 2.5vw, 2rem);
  font-size: clamp(0.7rem, 0.9vw, 0.85rem);
  letter-spacing: 0.05em;
  color: #666;
}

.container {
  width: min(73.75rem, 94vw);
  margin: 0 auto;
  padding: 0 2% 7%;
}

.category-row {
  display: grid;
  gap: 2.5%;
  margin-bottom: 2.5%;
}

.row-4 {
  grid-template-columns: repeat(4, 1fr);
}

.row-3 {
  grid-template-columns: repeat(3, 1fr);
}

.card {
  position: relative;
  width: 100%;
  aspect-ratio: 9 / 16;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
}

.card,
.card:visited,
.card:hover,
.card:active {
  color: black;
  text-decoration: none;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: left top;
}

.card-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,0.85);
  padding: 2% 4%;
  letter-spacing: 0.0625rem;
  width: max-content;
  max-width: 92%;
  white-space: normal;
  overflow-wrap: break-word;
  text-align: center;
  box-sizing: border-box;
  z-index: 2;
  font-size: clamp(0.62rem, 1.05vw, 1rem);
  opacity: 1;
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.8);
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 1;
}

.card:hover::before {
  opacity: 1;
}

@media (max-width: 37.5em) {
  .page-title {
    font-size: 92%;
  }

  .card-overlay {
    padding: 3% 5%;
  }

  .row-4 {
    grid-template-columns: repeat(2, 1fr);
  }

  .row-3 {
    grid-template-columns: repeat(3, 1fr);
  }

  .page-title,
  .page-subtitle {
    display: none;
  }

  .container,
  .grid {
    width: 100% !important;
    max-width: 100% !important;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  .card,
  .item,
  .video-wrapper {
    width: 100% !important;
    max-width: 100% !important;
  }

  .card img,
  .item img,
  video {
    width: 100% !important;
    height: auto !important;
  }

  iframe {
    width: 100% !important;
    max-width: 100% !important;
  }
}
</style>
</head>
